services:
  graphhopper:
    image: graphhopper/graphhopper:7
    volumes:
      - ./graphhopper/data:/data
      - ./graphhopper/config.yml:/graphhopper/config.yml
    ports:
      - "8989:8989"
    environment:
      - JAVA_OPTS=-Xmx2g -Xms256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8989/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GRAPHHOPPER_URL=http://graphhopper:8989
    depends_on:
      graphhopper:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
