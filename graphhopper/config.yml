graphhopper:
  datareader.file: /data/map.osm.pbf
  graph.location: /data/graph-cache

  graph.encoded_values: car_access, car_average_speed, road_class, road_environment, max_speed, roundabout, surface, country

  profiles:
    - name: auto
      custom_model_files: []

  profiles_lm:
    - profile: auto

server:
  application_connectors:
    - type: http
      port: 8989
      bind_host: 0.0.0.0
  admin_connectors:
    - type: http
      port: 8990
      bind_host: 0.0.0.0
